<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניתוח נתונים - EDA Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2744;
            --accent-1: #6c63ff;
            --accent-2: #00d2ff;
            --accent-3: #ff6b6b;
            --accent-4: #ffd93d;
            --accent-5: #6bcb77;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0b8;
            --border: rgba(108, 99, 255, 0.2);
            --glow: rgba(108, 99, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.08) 0%, transparent 50%),שם משת
                radial-gradient(ellipse at 80% 20%, rgba(0,210,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255,107,107,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .container {
            max-width: 1400px; margin: 0 auto; padding: 30px 20px;
            position: relative; z-index: 1;
        }

        header {
            text-align: center; margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary); font-size: 1.1rem; font-weight: 300;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease both;
            position: relative; overflow: hidden;
        }

        .kpi-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px var(--glow);
            border-color: var(--accent-1);
        }

        .kpi-card .icon { font-size: 2rem; margin-bottom: 8px; }
        .kpi-card .value {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .kpi-card .label {
            font-size: 0.9rem; color: var(--text-secondary); margin-top: 4px;
        }

        /* Chart Grid */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(580px, 1fr));
            gap: 24px; margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
            animation: fadeInUp 0.7s ease both;
            transition: all 0.3s ease;
        }

        .chart-card:hover {
            border-color: rgba(108, 99, 255, 0.4);
            box-shadow: 0 5px 30px var(--glow);
        }

        .chart-card.full-width {
            grid-column: 1 / -1;
        }

        .chart-card h3 {
            font-size: 1.35rem; font-weight: 600;
            margin-bottom: 16px; color: var(--text-primary);
            display: flex; align-items: center; gap: 8px;
        }

        .chart-card h3 .badge {
            font-size: 0.7rem; background: var(--accent-1);
            color: #fff; padding: 2px 8px; border-radius: 20px;
            font-weight: 400;
        }

        .chart-wrapper {
            position: relative; width: 100%;
            max-height: 380px;
        }

        /* Data Table */
        .table-wrapper {
            overflow-x: auto; border-radius: 12px;
            border: 1px solid var(--border);
            max-height: 400px; overflow-y: auto;
        }

        table {
            width: 100%; border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            background: var(--bg-secondary);
            padding: 12px 14px; text-align: right;
            font-weight: 600; color: var(--accent-2);
            position: sticky; top: 0; z-index: 2;
        }

        td {
            padding: 10px 14px; border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        tr:hover td { background: rgba(108,99,255,0.05); }

        .sla-ok { color: var(--accent-5); font-weight: 600; }
        .sla-fail { color: var(--accent-3); font-weight: 600; }

        .loading {
            text-align: center; padding: 60px;
            font-size: 1.3rem; color: var(--text-secondary);
        }

        .loading .spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-1);
            border-radius: 50%; margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .chart-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.8rem; }
            .kpi-card .value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <header>
            <h1>📊 ניתוח נתונים חקרני (EDA)</h1>
            <p>ניתוח מקיף של נתוני פרויקטי מדידה ושטח</p>
        </header>
        <div id="app">
            <div class="loading">
                <div class="spinner"></div>
                <p>טוען נתונים...</p>
            </div>
        </div>
    </div>

<script>
// ============ DATA LOADING & PARSING ============
const CSV_PATH = 'data.csv';

async function loadData() {
    const resp = await fetch(CSV_PATH);
    const text = await resp.text();
    return new Promise((resolve) => {
        Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            complete: (results) => resolve(results.data)
        });
    });
}

function parseDate(s) {
    if (!s) return null;
    const d = new Date(s);
    return isNaN(d) ? null : d;
}

function daysBetween(a, b) {
    if (!a || !b) return null;
    return Math.round((b - a) / 86400000);
}

// ============ ANALYSIS FUNCTIONS ============
function analyzeData(raw) {
    const rows = raw.map(r => {
        const start = parseDate(r['התחלה']);
        const end = parseDate(r['סוף']);
        const slaDate = parseDate(r['תאריך סיום צפוי (SLA)']);
        const actualDays = daysBetween(start, end);
        const slaDays = parseFloat(r['SLA התחייבות (ימים)']) || null;
        const timeSpentSec = parseFloat(r['Σ Time Spent']) || 0;
        const timeSpentHrs = timeSpentSec / 3600;
        const office = parseFloat(r['Custom field (תשומות - משרד)']) || 0;
        const field = parseFloat(r['Custom field (תשומות - שטח)']) || 0;
        const amount = parseFloat(r['Custom field (סכום החשבון)']) || 0;
        const slaOk = slaDays && actualDays != null ? actualDays <= slaDays : null;
        const area = parseFloat(r['שטח בדונם']) || null;
        let areaGroup = 'לא מוגדר';
        if (area !== null) {
            if (area <= 5) areaGroup = 'קטן (0-5 דונם)';
            else if (area <= 10) areaGroup = 'בינוני (5-10 דונם)';
            else areaGroup = 'גדול (10+ דונם)';
        }

        return {
            label: r['Labels'] || '',
            issueKey: r['Issue key'] || '',
            start, end, slaDate,
            actualDays, slaDays, timeSpentHrs,
            projectType: r['Custom field (סוג פרויקט)'] || 'לא מוגדר',
            projectType2: r['Custom field (סוג פרויקט).1'] || '',
            manager: r['Custom field (מנהל פרויקט)'] || 'לא מוגדר',
            office, field, amount, slaOk,
            area, areaGroup,
            slaDeviation: actualDays != null && slaDays ? actualDays - slaDays : null
        };
    }).filter(r => r.issueKey);

    return rows;
}

function countBy(arr, key) {
    const m = {};
    arr.forEach(r => { const v = r[key] || 'לא מוגדר'; m[v] = (m[v] || 0) + 1; });
    return m;
}

function avgBy(arr, groupKey, valKey) {
    const sums = {}, counts = {};
    arr.forEach(r => {
        const g = r[groupKey] || 'לא מוגדר';
        const v = r[valKey];
        if (v != null) {
            sums[g] = (sums[g] || 0) + v;
            counts[g] = (counts[g] || 0) + 1;
        }
    });
    const res = {};
    for (const k in sums) res[k] = Math.round(sums[k] / counts[k] * 10) / 10;
    return res;
}

// ============ COLOR PALETTE ============
const COLORS = [
    '#6c63ff','#00d2ff','#ff6b6b','#ffd93d','#6bcb77',
    '#ff9a76','#a855f7','#38bdf8','#f472b6','#34d399',
    '#fb923c','#818cf8','#22d3ee','#f87171','#a3e635'
];

function getColors(n) { return Array.from({length: n}, (_, i) => COLORS[i % COLORS.length]); }

// ============ RENDERING ============
function renderDashboard(rows) {
    const app = document.getElementById('app');

    // KPIs
    const total = rows.length;
    const withSla = rows.filter(r => r.slaOk !== null);
    const slaOkCount = withSla.filter(r => r.slaOk).length;
    const slaRate = withSla.length ? Math.round(slaOkCount / withSla.length * 100) : 0;
    const validDays = rows.filter(r => r.actualDays != null).map(r => r.actualDays);
    const avgDays = validDays.length ? Math.round(validDays.reduce((a,b)=>a+b,0) / validDays.length) : 0;
    const medianDays = validDays.length ? validDays.sort((a,b)=>a-b)[Math.floor(validDays.length/2)] : 0;
    const totalHrs = Math.round(rows.reduce((a,r) => a + r.timeSpentHrs, 0));
    const totalAmount = Math.round(rows.reduce((a,r) => a + r.amount, 0));
    const projectTypes = Object.keys(countBy(rows, 'projectType')).length;
    const areaRows = rows.filter(r => r.area !== null);
    const totalArea = Math.round(areaRows.reduce((a,r) => a + r.area, 0));

    app.innerHTML = `
        <div class="kpi-grid">
            <div class="kpi-card" style="animation-delay:.1s"><div class="icon">📋</div><div class="value">${total}</div><div class="label">סה"כ פרויקטים</div></div>
            <div class="kpi-card" style="animation-delay:.2s"><div class="icon">✅</div><div class="value">${slaRate}%</div><div class="label">עמידה ב-SLA</div></div>
            <div class="kpi-card" style="animation-delay:.3s"><div class="icon">📅</div><div class="value">${avgDays}</div><div class="label">ממוצע ימים לפרויקט</div></div>
            <div class="kpi-card" style="animation-delay:.4s"><div class="icon">⏱️</div><div class="value">${totalHrs.toLocaleString()}</div><div class="label">סה"כ שעות עבודה</div></div>
            <div class="kpi-card" style="animation-delay:.5s"><div class="icon">📐</div><div class="value">${projectTypes}</div><div class="label">סוגי פרויקטים</div></div>
            <div class="kpi-card" style="animation-delay:.6s"><div class="icon">💰</div><div class="value">₪${(totalAmount/1000).toFixed(0)}K</div><div class="label">סה"כ סכום חשבונות</div></div>
            <div class="kpi-card" style="animation-delay:.7s"><div class="icon">🌳</div><div class="value">${totalArea.toLocaleString()}</div><div class="label">סה"כ שטח (דונם)</div></div>
        </div>

        <div class="chart-grid">
            <div class="chart-card"><h3>📊 התפלגות סוגי פרויקטים <span class="badge">Pie</span></h3><div class="chart-wrapper"><canvas id="chartTypesPie"></canvas></div></div>
            <div class="chart-card"><h3>📈 עמידה ב-SLA לפי סוג <span class="badge">Bar</span></h3><div class="chart-wrapper"><canvas id="chartSlaByType"></canvas></div></div>
            <div class="chart-card"><h3>⏳ משך ממוצע לפי סוג פרויקט <span class="badge">Bar</span></h3><div class="chart-wrapper"><canvas id="chartAvgDays"></canvas></div></div>
            <div class="chart-card"><h3>👤 עומס מנהלי פרויקטים <span class="badge">Bar</span></h3><div class="chart-wrapper"><canvas id="chartManagers"></canvas></div></div>
            <div class="chart-card full-width"><h3>📉 חריגה מ-SLA לפי פרויקט <span class="badge">Scatter</span></h3><div class="chart-wrapper"><canvas id="chartSlaScatter"></canvas></div></div>
            <div class="chart-card"><h3>🏢 תשומות משרד vs שטח <span class="badge">Doughnut</span></h3><div class="chart-wrapper"><canvas id="chartOfficeField"></canvas></div></div>
            <div class="chart-card"><h3>🕐 שעות עבודה לפי סוג <span class="badge">Bar</span></h3><div class="chart-wrapper"><canvas id="chartHoursByType"></canvas></div></div>
            <div class="chart-card full-width"><h3>📅 קו זמן - פרויקטים לפי חודש <span class="badge">Line</span></h3><div class="chart-wrapper"><canvas id="chartTimeline"></canvas></div></div>
        </div>

        <div style="margin-top: 30px; margin-bottom: 20px;">
            <h2 style="font-size: 1.6rem; color: var(--accent-2); border-bottom: 1px dashed var(--border); padding-bottom: 8px;">🌳 ניתוח קבוצות שטח (דונם)</h2>
        </div>
        <div class="chart-grid">
            <div class="chart-card"><h3>🌳 התפלגות לפי קבוצת שטח <span class="badge">Doughnut</span></h3><div class="chart-wrapper"><canvas id="chartAreaGroupPie"></canvas></div></div>
            <div class="chart-card"><h3>⏳ משך ממוצע לפי קבוצת שטח <span class="badge">Bar</span></h3><div class="chart-wrapper"><canvas id="chartAreaGroupAvgDays"></canvas></div></div>
        </div>

        <div class="chart-grid">
            <div class="chart-card full-width">
                <h3>📋 טבלת נתונים מפורטת <span class="badge">${total} רשומות</span></h3>
                <div class="table-wrapper">
                    <table>
                        <thead><tr>
                            <th>מזהה</th><th>סוג פרויקט</th><th>מנהל</th><th>משך (ימים)</th>
                            <th>SLA (ימים)</th><th>חריגה</th><th>שעות עבודה</th><th>שטח (דונם)</th><th>סכום</th>
                        </tr></thead>
                        <tbody id="dataTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    `;

    buildCharts(rows);
    buildTable(rows);
}

function buildCharts(rows) {
    const defaults = Chart.defaults;
    defaults.color = '#a0a0b8';
    defaults.font.family = 'Heebo';
    defaults.font.size = 14; // הגדלת גופן ברירת המחדל של הגרפים לקריאות מיטבית
    defaults.plugins.legend.labels.font = { size: 14, family: 'Heebo' };
    defaults.plugins.legend.labels.padding = 16;

    // 1. Project types pie
    const typeCounts = countBy(rows, 'projectType');
    const typeLabels = Object.keys(typeCounts);
    new Chart(document.getElementById('chartTypesPie'), {
        type: 'doughnut',
        data: {
            labels: typeLabels,
            datasets: [{ data: Object.values(typeCounts), backgroundColor: getColors(typeLabels.length), borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
    });

    // 2. SLA compliance by type
    const slaByType = {};
    rows.filter(r => r.slaOk !== null).forEach(r => {
        const t = r.projectType;
        if (!slaByType[t]) slaByType[t] = { ok: 0, fail: 0 };
        r.slaOk ? slaByType[t].ok++ : slaByType[t].fail++;
    });
    const slaLabels = Object.keys(slaByType);
    new Chart(document.getElementById('chartSlaByType'), {
        type: 'bar',
        data: {
            labels: slaLabels,
            datasets: [
                { label: 'עומד ב-SLA', data: slaLabels.map(l => slaByType[l].ok), backgroundColor: '#6bcb77' },
                { label: 'חורג מ-SLA', data: slaLabels.map(l => slaByType[l].fail), backgroundColor: '#ff6b6b' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid:{color:'rgba(255,255,255,0.05)'} }, y: { stacked: true, grid:{color:'rgba(255,255,255,0.05)'} } } }
    });

    // 3. Avg days by type
    const avgDaysByType = avgBy(rows, 'projectType', 'actualDays');
    const adLabels = Object.keys(avgDaysByType).sort((a,b) => avgDaysByType[b] - avgDaysByType[a]);
    new Chart(document.getElementById('chartAvgDays'), {
        type: 'bar',
        data: {
            labels: adLabels,
            datasets: [{ label: 'ממוצע ימים', data: adLabels.map(l => avgDaysByType[l]), backgroundColor: getColors(adLabels.length), borderRadius: 6 }]
        },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid:{color:'rgba(255,255,255,0.05)'} }, y: { grid:{display:false} } } }
    });

    // 4. Manager workload
    const mgrCounts = countBy(rows, 'manager');
    const mgrLabels = Object.keys(mgrCounts).sort((a,b) => mgrCounts[b] - mgrCounts[a]).slice(0, 12);
    new Chart(document.getElementById('chartManagers'), {
        type: 'bar',
        data: {
            labels: mgrLabels,
            datasets: [{ label: 'מספר פרויקטים', data: mgrLabels.map(l => mgrCounts[l]), backgroundColor: getColors(mgrLabels.length), borderRadius: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid:{display:false} }, y: { grid:{color:'rgba(255,255,255,0.05)'} } } }
    });

    // 5. SLA deviation scatter
    const scatterData = rows.filter(r => r.slaDeviation !== null && r.timeSpentHrs > 0).map(r => ({
        x: r.timeSpentHrs, y: r.slaDeviation, label: r.issueKey
    }));
    new Chart(document.getElementById('chartSlaScatter'), {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'חריגה מ-SLA (ימים)',
                data: scatterData.map(d => ({ x: d.x, y: d.y })),
                backgroundColor: scatterData.map(d => d.y <= 0 ? 'rgba(107,203,119,0.6)' : 'rgba(255,107,107,0.6)'),
                pointRadius: 5, pointHoverRadius: 8
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                x: { title: { display: true, text: 'שעות עבודה' }, grid:{color:'rgba(255,255,255,0.05)'} },
                y: { title: { display: true, text: 'חריגה מ-SLA (ימים)' }, grid:{color:'rgba(255,255,255,0.05)'} }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            const d = scatterData[ctx.dataIndex];
                            return `${d.label}: ${d.y} ימים חריגה, ${Math.round(d.x)} שעות`;
                        }
                    }
                }
            }
        }
    });

    // 6. Office vs Field doughnut
    const totalOffice = Math.round(rows.reduce((a,r) => a + r.office, 0));
    const totalField = Math.round(rows.reduce((a,r) => a + r.field, 0));
    new Chart(document.getElementById('chartOfficeField'), {
        type: 'doughnut',
        data: {
            labels: ['תשומות משרד', 'תשומות שטח'],
            datasets: [{ data: [totalOffice, totalField], backgroundColor: ['#6c63ff', '#00d2ff'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });

    // 7. Hours by type
    const hrsByType = {};
    rows.forEach(r => { const t = r.projectType; hrsByType[t] = (hrsByType[t] || 0) + r.timeSpentHrs; });
    const hLabels = Object.keys(hrsByType).sort((a,b) => hrsByType[b] - hrsByType[a]);
    new Chart(document.getElementById('chartHoursByType'), {
        type: 'bar',
        data: {
            labels: hLabels,
            datasets: [{ label: 'שעות עבודה', data: hLabels.map(l => Math.round(hrsByType[l])), backgroundColor: getColors(hLabels.length), borderRadius: 6 }]
        },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid:{color:'rgba(255,255,255,0.05)'} }, y: { grid:{display:false} } } }
    });

    // 8. Timeline
    const monthly = {};
    rows.forEach(r => {
        if (!r.start) return;
        const key = `${r.start.getFullYear()}-${String(r.start.getMonth()+1).padStart(2,'0')}`;
        monthly[key] = (monthly[key] || 0) + 1;
    });
    const tlLabels = Object.keys(monthly).sort();
    new Chart(document.getElementById('chartTimeline'), {
        type: 'line',
        data: {
            labels: tlLabels,
            datasets: [{
                label: 'פרויקטים חדשים',
                data: tlLabels.map(l => monthly[l]),
                borderColor: '#6c63ff', backgroundColor: 'rgba(108,99,255,0.1)',
                fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#00d2ff'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid:{color:'rgba(255,255,255,0.05)'} }, y: { grid:{color:'rgba(255,255,255,0.05)'} } } }
    });

    // 9. Area Group Pie (only for projects with defined area)
    const areaRows = rows.filter(r => r.area !== null);
    const areaGroupCounts = { 'קטן (0-5 דונם)': 0, 'בינוני (5-10 דונם)': 0, 'גדול (10+ דונם)': 0 };
    areaRows.forEach(r => {
        if (areaGroupCounts[r.areaGroup] !== undefined) {
            areaGroupCounts[r.areaGroup]++;
        }
    });
    new Chart(document.getElementById('chartAreaGroupPie'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(areaGroupCounts),
            datasets: [{
                data: Object.values(areaGroupCounts),
                backgroundColor: ['#6c63ff', '#00d2ff', '#ff6b6b'],
                borderWidth: 0
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
    });

    // 10. Area Group Avg Days
    const avgDaysByAreaGroup = {};
    const areaGroupCountsForAvg = {};
    areaRows.filter(r => r.actualDays != null).forEach(r => {
        const g = r.areaGroup;
        avgDaysByAreaGroup[g] = (avgDaysByAreaGroup[g] || 0) + r.actualDays;
        areaGroupCountsForAvg[g] = (areaGroupCountsForAvg[g] || 0) + 1;
    });
    const avgLabels = ['קטן (0-5 דונם)', 'בינוני (5-10 דונם)', 'גדול (10+ דונם)'];
    const avgValues = avgLabels.map(l => {
        const count = areaGroupCountsForAvg[l] || 0;
        return count > 0 ? Math.round((avgDaysByAreaGroup[l] / count) * 10) / 10 : 0;
    });
    new Chart(document.getElementById('chartAreaGroupAvgDays'), {
        type: 'bar',
        data: {
            labels: avgLabels,
            datasets: [{
                label: 'ממוצע ימים',
                data: avgValues,
                backgroundColor: ['#6c63ff', '#00d2ff', '#ff6b6b'],
                borderRadius: 6
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid:{display:false} }, y: { grid:{color:'rgba(255,255,255,0.05)'} } } }
    });
}

function buildTable(rows) {
    const tbody = document.getElementById('dataTableBody');
    const sorted = [...rows].sort((a,b) => (b.actualDays||0) - (a.actualDays||0));
    tbody.innerHTML = sorted.map(r => `
        <tr>
            <td>${r.issueKey}</td>
            <td>${r.projectType}</td>
            <td>${r.manager}</td>
            <td>${r.actualDays ?? '-'}</td>
            <td>${r.slaDays ?? '-'}</td>
            <td class="${r.slaOk === true ? 'sla-ok' : r.slaOk === false ? 'sla-fail' : ''}">${r.slaDeviation != null ? (r.slaDeviation > 0 ? '+' : '') + r.slaDeviation : '-'}</td>
            <td>${Math.round(r.timeSpentHrs)}</td>
            <td>${r.area != null ? `${r.area.toLocaleString()} (${r.area <= 5 ? 'קטן' : r.area <= 10 ? 'בינוני' : 'גדול'})` : '-'}</td>
            <td>${r.amount ? '₪' + r.amount.toLocaleString() : '-'}</td>
        </tr>
    `).join('');
}

// ============ INIT ============
loadData().then(raw => {
    const rows = analyzeData(raw);
    renderDashboard(rows);
}).catch(err => {
    document.getElementById('app').innerHTML = `<div class="loading" style="color:#ff6b6b">❌ שגיאה בטעינת הנתונים: ${err.message}</div>`;
});
</script>
</body>
</html>
